version: '3.9'
services:
  app:
    build: .
    ports: ["8080:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__QNAPGameDatabase=Host=db;Port=5432;Database=MercsAndBeasts;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: MercsAndBeasts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mercs_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
    restart: unless-stopped

volumes:
  mercs_data:
