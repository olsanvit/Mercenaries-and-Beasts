services:

  # ── Reverse proxy + SSL (Let's Encrypt) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - apps
    restart: unless-stopped

  # ── Applications ─────────────────────────────────────────────────────────────
  vo2datamanager:
    build:
      context: ${APPS_DIR}/VO2DataManager
      dockerfile: Dockerfile
    container_name: vo2datamanager
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  vinwmivehicles:
    build:
      context: ${APPS_DIR}/VINWMIVehicles
      dockerfile: Dockerfile
    container_name: vinwmivehicles
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  unisportmanager:
    build:
      context: ${APPS_DIR}/UNISportManager
      dockerfile: Dockerfile
    container_name: unisportmanager
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  topelevenst:
    build:
      context: ${APPS_DIR}/TopElevenStats
      dockerfile: Dockerfile
    container_name: topelevenst
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulatereal:
    build:
      context: ${APPS_DIR}/SimulateReal
      dockerfile: Dockerfile
    container_name: simulatereal
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulategames:
    build:
      context: ${APPS_DIR}/SimulateGames
      dockerfile: Dockerfile
    container_name: simulategames
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulatecar:
    build:
      context: ${APPS_DIR}/SimulateCar
      dockerfile: Dockerfile
    container_name: simulatecar
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  myzabbix:
    build:
      context: ${APPS_DIR}/MyZabbix
      dockerfile: Dockerfile
    container_name: myzabbix
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  mercenariesandbeasts:
    build:
      context: ${APPS_DIR}/MercenariesAndBeasts/Mercenaries-and-Beasts
      dockerfile: Dockerfile
    container_name: mercenariesandbeasts
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

networks:
  apps:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
