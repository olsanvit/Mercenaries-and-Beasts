services:

  # ── Reverse proxy + SSL (Let's Encrypt) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet
    restart: unless-stopped

  # ── Applications ─────────────────────────────────────────────────────────────
  # Publish složky jsou nahrány z Macu přes SCP, kontejner jen spustí DLL
  # Mac → scp publish/ → /share/Public/BlazorXxx/publish/ → docker volume mount

  vo2datamanager:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: vo2datamanager
    working_dir: /app
    volumes:
      - /share/Public/BlazorVO2DataManager/publish:/app:ro
    command: dotnet VO2DataManager.Web.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TZ: Europe/Prague
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
    networks:
      - appnet
    restart: unless-stopped

  vinwmivehicles:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    container_name: vinwmivehicles
    working_dir: /app
    volumes:
      - /share/Public/BlazorVINWMI/publish:/app:ro
    command: dotnet VINWMIVehicles.Web.dll
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
