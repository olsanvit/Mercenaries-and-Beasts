    restart: unless-stopped

  mercenariesandbeasts:
    image: ghcr.io/${GHCR_USER}/mercenariesandbeasts:latest
    container_name: mercenariesandbeasts
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

networks:
  apps:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
