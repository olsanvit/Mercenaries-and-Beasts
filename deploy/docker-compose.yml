services:

  # ── Reverse proxy + SSL (Let's Encrypt) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - apps
    restart: unless-stopped

  # ── Applications (obrazy buildované na Macu, pushované na ghcr.io) ──────────
  vo2datamanager:
    image: ghcr.io/${GHCR_USER}/vo2datamanager:latest
    container_name: vo2datamanager
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  vinwmivehicles:
    image: ghcr.io/${GHCR_USER}/vinwmivehicles:latest
    container_name: vinwmivehicles
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  unisportmanager:
    image: ghcr.io/${GHCR_USER}/unisportmanager:latest
    container_name: unisportmanager
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  topelevenst:
    image: ghcr.io/${GHCR_USER}/topelevenst:latest
    container_name: topelevenst
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulatereal:
    image: ghcr.io/${GHCR_USER}/simulatereal:latest
    container_name: simulatereal
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulategames:
    image: ghcr.io/${GHCR_USER}/simulategames:latest
    container_name: simulategames
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  simulatecar:
    image: ghcr.io/${GHCR_USER}/simulatecar:latest
    container_name: simulatecar
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
      - apps
    restart: unless-stopped

  myzabbix:
    image: ghcr.io/${GHCR_USER}/myzabbix:latest
    container_name: myzabbix
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    networks:
